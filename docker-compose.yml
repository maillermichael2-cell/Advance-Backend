services:
  db:
    image: postgres:15-alpine
    container_name: realty_api_db
    environment:
      POSTGRES_DB: realty_db
      POSTGRES_USER: realty_user
      POSTGRES_PASSWORD: realty_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realty_user -d realty_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: realty_api_web
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./api:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      SECRET_KEY: "django-insecure-docker-dev-key-change-in-production"
      DATABASE_URL: "postgresql://realty_user:realty_password@db:5432/realty_db"
      ALLOWED_HOSTS: "localhost,127.0.0.1,web"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/schema/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:

networks:
  default:
    name: realty_network
